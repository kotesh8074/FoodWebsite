<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Food Court</title>

    <link rel="icon" type="image/png" href="assets/img/food-munch-img.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="auth-header">
    <a href="index.html" class="site-logo">
        <img src="assets/img/food-munch-img.png" alt="Food Court Logo">
    </a>
    <!-- <a href="index.html" class="home-link">Home</a> -->
</header>
    <section class="login-section">

        <div class="login-form">
            <h2>Create Account</h2>

            <input type="text" placeholder="Full Name">

            <input type="email" placeholder="Email Address">

            <input type="password" placeholder="Password">

            <input type="password" placeholder="Confirm Password">

            <button type="button" class="auth-btn">Register</button>

            <p>
                Already have an account?
                <a href="login.html">Login</a>
            </p>
        </div>

    </section>

</body>
</html>
